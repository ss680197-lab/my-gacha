<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPY中壢母親節扭蛋機</title>
    <style>
        :root { --main-pink: #ff8fa3; --dark-pink: #d63384; --bg-pink: #fff0f3; }
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background-color: var(--bg-pink); color: #5a5a5a; padding: 20px; margin: 0; overflow-x: hidden; }
        .container { background: #fff; max-width: 400px; margin: 0 auto; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #ffccd5; position: relative; }
        
        h1 { color: var(--dark-pink); font-size: 20px; margin: 0; }
        .sub-title { font-size: 11px; color: var(--main-pink); margin-bottom: 15px; letter-spacing: 2px; }

        /* 扭蛋機構造 */
        .gacha-machine { width: 220px; height: 350px; margin: 0 auto; position: relative; }
        
        /* 頂部圓形透明櫥窗 */
        .glass-dome { 
            width: 180px; height: 180px; 
            background: rgba(224, 247, 250, 0.6); 
            border: 4px solid #f0f0f0;
            border-radius: 50%; 
            position: absolute; top: 0; left: 20px; 
            z-index: 5;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        /* 櫥窗內的小裝飾球 */
        .deco-egg { width: 30px; height: 30px; border-radius: 50%; position: absolute; opacity: 0.8; }

        /* 機器下半部 (底座) */
        .machine-base { 
            width: 170px; height: 160px; 
            background: #ff4d6d; 
            border: 4px solid var(--dark-pink);
            border-radius: 10px 10px 20px 20px;
            position: absolute; bottom: 30px; left: 25px;
            z-index: 10;
        }

        /* 旋轉鈕 */
        .dial { 
            width: 60px; height: 60px; background: #fff; 
            border: 5px solid var(--dark-pink); border-radius: 50%;
            position: absolute; top: 30px; left: 55px;
            display: flex; align-items: center; justify-content: center;
        }
        .dial::after { content: ''; width: 40px; height: 10px; background: var(--dark-pink); border-radius: 5px; }
        .dial-spin { animation: dialSpin 0.8s ease-in-out; }
        @keyframes dialSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 出蛋口 */
        .exit-hole { 
            width: 70px; height: 50px; background: #444; 
            position: absolute; bottom: -10px; left: 50px;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 5px 10px #000;
        }

        /* --- 掉落的立體扭蛋球 --- */
        .real-egg {
            width: 55px; height: 55px;
            position: absolute;
            top: 230px; left: 83px; /* 初始在機器內部 */
            z-index: 2; /* 在底座後面掉下來 */
            display: none;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #ffccd5 45%, #ff8fa3 85%);
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        /* 蛋的中間接縫線 */
        .real-egg::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(0,0,0,0.1); }

        /* 掉落動畫 */
        .egg-fall {
            display: block !important;
            animation: eggFall 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes eggFall {
            0% { transform: translateY(0) scale(0.6); opacity: 0; }
            20% { opacity: 1; transform: translateY(20px) scale(1); }
            50% { transform: translateY(115px) rotate(180deg); } /* 落地 */
            70% { transform: translateY(95px) rotate(270deg); }  /* 彈起 */
            100% { transform: translateY(115px) rotate(360deg); opacity: 1; } /* 停在正中央 */
        }

        .click-me { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); color: var(--dark-pink); font-weight: bold; font-size: 14px; white-space: nowrap; display: none; }

        /* 按鈕與介面 */
        .btn-draw { 
            background: linear-gradient(to bottom, #ff8fa3, #d63384); 
            color: white; border: none; width: 100%; padding: 15px; 
            border-radius: 50px; font-size: 18px; font-weight: bold; 
            margin-top: 20px; box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3);
            cursor: pointer;
        }
        .btn-draw:disabled { background: #ccc; box-shadow: none; }

        /* 結果與紀錄 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal { background: white; padding: 30px; border-radius: 25px; width: 80%; border: 4px solid var(--main-pink); }
        .history { margin-top: 20px; text-align: left; font-size: 13px; display: none; background: #fffafb; padding: 10px; border-radius: 15px; border: 1px solid #ffccd5; }
        .admin { margin-top: 40px; opacity: 0.1; font-size: 9px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BPY中壢母親節扭蛋機</h1>
    <div class="sub-title">Happy Mother's Day</div>
    
    <div style="font-size: 16px; font-weight: bold; color: var(--dark-pink); margin-bottom: 10px;">
        剩餘次數：<span id="chances">0</span> 回
    </div>

    <div class="gacha-machine">
        <div class="glass-dome">
            <div class="deco-egg" style="background:#ff8fa3; bottom:5px; left:20px;"></div>
            <div class="deco-egg" style="background:#ffd6e0; bottom:10px; left:50px;"></div>
            <div class="deco-egg" style="background:#ffccd5; bottom:5px; left:90px;"></div>
            <div class="deco-egg" style="background:#ff4d6d; bottom:15px; left:120px;"></div>
        </div>

        <div class="machine-base">
            <div id="dial" class="dial"></div>
            <div class="exit-hole"></div>
        </div>

        <div id="egg" class="real-egg" onclick="openEgg()">
            <div id="tip" class="click-me">🌸 點我開蛋 🌸</div>
        </div>
    </div>

    <button id="draw-btn" class="btn-draw" onclick="draw()">扭轉母親節驚喜</button>

    <div id="overlay">
        <div class="modal">
            <div id="prize-text" style="font-size:20px; font-weight:bold; color:var(--dark-pink); margin-bottom:20px;"></div>
            <button onclick="closeModal()" style="background:var(--main-pink); color:white; border:none; padding:10px 25px; border-radius:20px;">收下驚喜 🌸</button>
        </div>
    </div>

    <div id="history" class="history">
        <strong>📜 獲獎紀錄</strong>
        <div id="history-content" style="margin-top:5px;"></div>
    </div>

    <div class="admin" onclick="addChance()">Manager Panel</div>
</div>

<script>
    const prizes = [
        { name: "單堂 $2500 皮拉提斯課程折抵券乙張", weight: 10 },
        { name: "Indiba 體驗卷 15 分鐘乙張", weight: 20 },
        { name: "當次購課折抵單堂金額 50 元", weight: 50 },
        { name: "單堂 $2500 皮拉提斯課程折抵券兩張", weight: 5 },
        { name: "當下加贈四堂皮拉提斯課程", weight: 5 }
    ];

    let chances = parseInt(localStorage.getItem('bpyChances')) || 0;
    let log = JSON.parse(localStorage.getItem('bpyLog')) || [];
    let currentPrize = null;

    update();

    function update() {
        document.getElementById('chances').innerText = chances;
        document.getElementById('draw-btn').disabled = chances <= 0;
        if (log.length > 0) {
            document.getElementById('history').style.display = 'block';
            document.getElementById('history-content').innerHTML = log.map(i => 
                `<div style="border-bottom:1px dashed #eee; padding:5px 0;">🎁 ${i.name} <br><small style="color:#bbb">${i.date}</small></div>`
            ).reverse().join('');
        }
    }

    function draw() {
        if (chances <= 0) return;
        chances--;
        localStorage.setItem('bpyChances', chances);
        currentPrize = prizes[Math.floor(Math.random() * prizes.length)];
        
        const dial = document.getElementById('dial');
        const egg = document.getElementById('egg');
        const tip = document.getElementById('tip');
        const btn = document.getElementById('draw-btn');

        btn.disabled = true;
        egg.style.display = 'none';
        egg.classList.remove('egg-fall');
        tip.style.display = 'none';
        
        dial.classList.add('dial-spin');
        
        setTimeout(() => {
            egg.classList.add('egg-fall');
        }, 800);

        setTimeout(() => {
            dial.classList.remove('dial-spin');
            tip.style.display = 'block';
        }, 2000);
    }

    function openEgg() {
        if(!currentPrize) return;
        const egg = document.getElementById('egg');
        const tip = document.getElementById('tip');
        
        // 簡單的點擊放大消失
        egg.style.transition = '0.3s';
        egg.style.transform = 'translateY(115px) scale(2)';
        egg.style.opacity = '0';
        tip.style.display = 'none';

        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        log.push({ name: currentPrize.name, date: dateStr });
        localStorage.setItem('bpyLog', JSON.stringify(log));

        setTimeout(() => {
            document.getElementById('prize-text').innerText = "🎊 恭喜獲獎 🎊\n" + currentPrize.name;
            document.getElementById('overlay').style.display = 'flex';
            update();
        }, 300);
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('egg').style.display = 'none';
        document.getElementById('egg').style.transform = '';
        document.getElementById('egg').style.opacity = '1';
    }

    function addChance() {
        if (prompt("授權碼") === "8888") {
            chances += parseInt(prompt("增加幾次機會？") || 0);
            localStorage.setItem('bpyChances', chances);
            update();
        }
    }
</script>

</body>
</html>
