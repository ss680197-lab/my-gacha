<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPY中壢母親節扭蛋機</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #fff5f7; color: #444; padding: 20px; }
        .container { background: white; max-width: 400px; margin: 0 auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #ffcad4; }
        h1 { color: #d63384; font-size: 24px; margin-bottom: 10px; }
        .description { font-size: 14px; color: #666; line-height: 1.6; text-align: left; background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #ffcad4; }
        .chance-count { font-size: 20px; font-weight: bold; color: #d63384; margin: 15px 0; padding: 10px; background: #ffeef2; border-radius: 50px; }
        .machine { font-size: 100px; margin: 20px 0; transition: transform 0.1s; }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 100% { transform: translate(0,0) rotate(0deg); } }
        button { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4); width: 100%; }
        button:disabled { background: #ccc !important; box-shadow: none !important; cursor: not-allowed; }
        #result { margin-top: 25px; font-size: 18px; font-weight: bold; color: #d63384; white-space: pre-line; padding: 15px; border: 2px dashed #ffcad4; background: #fffafb; display: none; border-radius: 10px; }
        
        /* 紀錄區樣式 */
        .history-section { margin-top: 30px; text-align: left; display: none; }
        .history-title { font-size: 16px; font-weight: bold; color: #d63384; border-bottom: 1px solid #ffcad4; padding-bottom: 5px; margin-bottom: 10px; }
        .history-item { font-size: 13px; padding: 8px; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: center; }
        .history-item span { color: #999; font-size: 11px; }

        .admin-zone { margin-top: 50px; opacity: 0.2; font-size: 12px; padding: 10px; }
        .prize-list { text-align: left; font-size: 13px; color: #777; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>BPY中壢母親節扭蛋機</h1>
    
    <div class="description">
        <strong>活動說明：</strong><br>
        凡於 5/1-5/31 期間於本店消費金額達到 4 萬，即可獲得扭蛋機會乙次。金額可累計，8 萬兩次以此類推。
    </div>

    <div class="chance-count">剩餘抽獎次數：<span id="chance-text">0</span> 次</div>
    
    <div id="machine-icon" class="machine">🎰</div>
    
    <button id="draw-btn" onclick="startGacha()">開始扭蛋</button>

    <div id="result"></div>

    <div id="history-section" class="history-section">
        <div class="history-title">📜 我的獲獎紀錄</div>
        <div id="history-list"></div>
    </div>

    <div class="prize-list">
        <strong>獎項說明：</strong><br>
        1. 單堂 $2500 皮拉提斯課程折抵券乙張：不限本人使用<br>
        2. Indiba 體驗卷 15 分鐘乙張：限本人使用<br>
        3. 當次購課折抵單堂金額 50 元<br>
        4. 單堂 $2500 皮拉提斯課程折抵券兩張：不限本人使用<br>
        5. 當下加贈四堂皮拉提斯課程：限本人使用
    </div>

    <div class="admin-zone">
        <span onclick="adminAddChance()">【管理員操作】</span> | 
        <span onclick="clearHistory()">清除紀錄</span>
    </div>
</div>

<script>
    const prizes = [
        { name: "單堂 $2500 皮拉提斯課程折抵券乙張", weight: 10 },
        { name: "Indiba 體驗卷 15 分鐘乙張", weight: 20 },
        { name: "當次購課折抵單堂金額 50 元", weight: 50 },
        { name: "單堂 $2500 皮拉提斯課程折抵券兩張", weight: 5 },
        { name: "當下加贈四堂皮拉提斯課程", weight: 5 }
    ];

    let currentChances = parseInt(localStorage.getItem('bpyChances')) || 0;
    let history = JSON.parse(localStorage.getItem('bpyHistory')) || [];
    
    updateDisplay();
    renderHistory();

    function updateDisplay() {
        const btn = document.getElementById('draw-btn');
        document.getElementById('chance-text').innerText = currentChances;
        btn.disabled = (currentChances <= 0);
        if (currentChances <= 0) btn.innerText = "抽獎機會已用完";
        else btn.innerText = "開始扭蛋";
    }

    function renderHistory() {
        const section = document.getElementById('history-section');
        const list = document.getElementById('history-list');
        if (history.length > 0) {
            section.style.display = 'block';
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <div>🎁 ${item.name}</div>
                    <span>${item.time}</span>
                </div>
            `).reverse().join(''); // 最新的排上面
        } else {
            section.style.display = 'none';
        }
    }

    function startGacha() {
        if (currentChances <= 0) return;

        const btn = document.getElementById('draw-btn');
        const icon = document.getElementById('machine-icon');
        const resDiv = document.getElementById('result');

        currentChances--;
        localStorage.setItem('bpyChances', currentChances);
        
        btn.disabled = true;
        btn.innerText = "扭蛋進行中...";
        resDiv.style.display = 'none';
        icon.classList.add('shake');

        setTimeout(() => {
            icon.classList.remove('shake');
            const prize = getPrize();
            
            // 紀錄中獎資訊
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            history.push({ name: prize.name, time: timeStr });
            localStorage.setItem('bpyHistory', JSON.stringify(history));

            resDiv.style.display = 'block';
            resDiv.innerText = "🎊 恭喜獲獎 🎊\n" + prize.name;
            
            updateDisplay();
            renderHistory();
        }, 1500);
    }

    function getPrize() {
        const totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
        let random = Math.random() * totalWeight;
        for (const p of prizes) {
            if (random < p.weight) return p;
            random -= p.weight;
        }
    }

    function adminAddChance() {
        const password = prompt("請輸入授權碼：");
        if (password === "8888") {
            const num = prompt("要增加幾次抽獎機會？", "1");
            if (num && !isNaN(num)) {
                currentChances += parseInt(num);
                localStorage.setItem('bpyChances', currentChances);
                updateDisplay();
                alert("已成功增加 "
